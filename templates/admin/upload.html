{% extends "admin/base_admin.html" %}
{% block title %}Upload Project{% endblock %}

{% block content %}
<div class="admin-section-hd">
  <h2>Upload New Project</h2>
  <a href="{{ url_for('admin_dashboard') }}" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);transition:color .2s;"
     onmouseover="this.style.color='var(--volt)'" onmouseout="this.style.color='var(--muted)'">← Back to Dashboard</a>
</div>

<div class="admin-form">
  <form method="POST" action="{{ url_for('admin_upload') }}" enctype="multipart/form-data">

    <div class="form-row">
      <div class="form-group">
        <label>Project Title *</label>
        <input type="text" name="title" placeholder="e.g. 3kVA Solar Installation" required maxlength="120">
      </div>
      <div class="form-group">
        <label>Location *</label>
        <input type="text" name="location" placeholder="e.g. Bodija, Ibadan" required maxlength="120">
      </div>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select name="category">
        <option value="Solar Installation">☀️ Solar Installation</option>
        <option value="Inverter & Battery">🔋 Inverter &amp; Battery</option>
        <option value="House Wiring">🏠 House Wiring</option>
        <option value="DB Board & Breakers">🔌 DB Board &amp; Breakers</option>
        <option value="Electrical Repairs">⚡ Electrical Repairs</option>
        <option value="Solar Maintenance">🔧 Solar Maintenance</option>
      </select>
    </div>

    <div class="form-group">
      <label>Description (optional)</label>
      <textarea name="description" placeholder="Brief description of the job — what was done, system size, special details…" maxlength="600"></textarea>
    </div>

    <div class="form-group">
      <label>Project Photo (JPG, PNG or WEBP · max 8 MB)</label>
      <div class="file-drop" id="file-drop-zone">
        <input type="file" name="image" id="image-input" accept=".jpg,.jpeg,.png,.webp">
        <span class="file-drop-ico">📸</span>
        <div class="file-drop-lbl"><strong>Tap to choose photo</strong><br>or drag and drop here</div>
      </div>
      <div class="file-preview" id="file-preview">
        <img id="preview-img" src="" alt="Preview">
      </div>
    </div>

    <div class="form-group">
      <div class="toggle-row">
        <input type="checkbox" name="featured" id="featured">
        <label for="featured">Mark as featured (shown prominently on homepage)</label>
      </div>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button type="submit" class="btn-call" style="border:none;cursor:pointer;font-size:14px;padding:15px 28px;">
        ⬆ Upload Project
      </button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn-outline">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
