<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Layosam</title>
<meta name="robots" content="noindex, nofollow">
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="font" type="font/woff2" crossorigin
  href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9WdhyyTh89ZNpQ.woff2">
<link rel="preload" as="font" type="font/woff2" crossorigin
  href="https://fonts.gstatic.com/s/dmsans/v15/rP2Hp2ywxg089UriCZa4ET-DNl0.woff2">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap">
<style>
body{opacity:0;transition:opacity 0.15s ease;}
body.fonts-ready{opacity:1;}
@media print{body{opacity:1!important;}}
</style>
<script>
(function(){var t=setTimeout(function(){document.body.classList.add('fonts-ready');},800);if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){clearTimeout(t);document.body.classList.add('fonts-ready');});}else{clearTimeout(t);document.body.classList.add('fonts-ready');}})();
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="admin-login-wrap">
  <div class="admin-login-box">
    <span class="admin-login-icon">⚡</span>
    <div class="admin-login-title">LAYOSAM ADMIN</div>
    <div class="admin-login-sub">Enter your password to access the admin panel</div>

    {% if error %}
    <div class="admin-login-err">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group" style="text-align:left;">
        <label>Password</label>
        <input type="password" name="password" placeholder="Admin password" autofocus autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-call" style="width:100%;border:none;cursor:pointer;font-size:14px;">
        Enter Admin Panel
      </button>
    </form>

    <div style="margin-top:20px;">
      <a href="{{ url_for('index') }}" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;transition:color .2s;"
         onmouseover="this.style.color='var(--volt)'" onmouseout="this.style.color='var(--muted)'">← Back to website</a>
    </div>
  </div>
</div>
</body>
</html>
